<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИНФОРМАТИКА ТЕСТ - 2026</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 650px; text-align: center; border-top: 6px solid var(--p); position: relative; }
        .hidden { display: none !important; }
        
        /* Қатысушы есіміне арналған стиль */
        #user-tag { position: absolute; top: 15px; right: 20px; font-size: 14px; color: #7f8c8d; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 3px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #timer { font-size: 26px; font-weight: bold; color: var(--d); border: 3px solid var(--d); padding: 10px 20px; border-radius: 12px; display: inline-block; margin-bottom: 20px; background: #fff; }
        .opt { display: block; text-align: left; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .opt:hover { border-color: var(--p); background: #f0f7ff; }
        .sel { border-color: var(--p); background: #e1f0ff; font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .b-next { background: var(--p); } .b-prev { background: #95a5a6; } .b-fin { background: var(--s); }
        #v-msg { color: var(--d); font-weight: bold; margin-top: 15px; padding: 10px; background: #fff0f0; border-radius: 8px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="box">
    <div id="user-tag" class="hidden"></div>

    <div id="s-start">
        <h2 id="t-title">ИНФОРМАТИКА МҰҒАЛІМДЕРІНЕ АРНАЛҒАН ТЕСТ</h2>
        <div style="margin-bottom: 20px;">
            <button onclick="setL('kz')" id="btn-kz" style="background:var(--p); width:100px;">Қазақша</button>
            <button onclick="setL('ru')" id="btn-ru" style="background:#34495e; width:100px;">Русский</button>
        </div>
        <input type="text" id="ln" placeholder="Тегі / Фамилия">
        <input type="text" id="fn" placeholder="Аты / Имя">
        <button class="b-next" onclick="init()" style="width: 100%; margin-top: 10px;" id="btn-go">Бастау / Начать</button>
    </div>

    <div id="s-test" class="hidden">
        <div id="timer">30:00</div>
        <div style="color: #7f8c8d; margin-bottom: 10px;"><span id="txt-q">Сұрақ</span>: <span id="q-num">1</span> / 20</div>
        <h3 id="q-text" style="min-height: 50px;"></h3>
        <div id="options"></div>
        <div class="btns">
            <button id="p-btn" class="b-prev" onclick="move(-1)">Артқа</button>
            <button id="n-btn" class="b-next" onclick="move(1)">Келесі</button>
            <button id="f-btn" class="b-fin hidden" onclick="preFinish()">Аяқтау</button>
        </div>
        <p id="v-msg"><span id="txt-v">Ереже бұзу</span>: <span id="v-count">0</span></p>
    </div>

    <div id="s-res" class="hidden">
        <h2 id="r-name"></h2>
        <div style="font-size: 70px; font-weight: bold; color: var(--s); margin: 10px 0;" id="r-score">0</div>
        <div id="r-info" style="font-size: 18px; line-height: 1.6; text-align: left; display: inline-block;"></div>
        <br>
        <button class="b-next" onclick="restart()" style="margin-top: 20px; max-width: 200px;">Қайта бастау</button>
    </div>
</div>

<script>
const db = {
    kz: [
        {q:"Python-да тізім (list) қалай жазылады?", a:["[]","{}","()","<>"], c:0},
        {q:"HTML-дегі ең үлкен тақырып тегі?", a:["h6","h1","p","div"], c:1},
        {q:"Ең кіші ақпарат өлшем бірлігі?", a:["Байт","Килобайт","Бит","Мегабайт"], c:2},
    ],
    ru: [
        {q:"Как создается список (list) в Python?", a:["[]","{}","()","<>"], c:0},
        {q:"Какой тег HTML для самого большого заголовка?", a:["h6","h1","p","div"], c:1},
        {q:"Минимальная единица информации?", a:["Байт","Килобайт","Бит","Мегабайт"], c:2},
    ]
};

const ui = {
    kz: { q:"Сұрақ", v:"Ереже бұзу", back:"Артқа", next:"Келесі", fin:"Аяқтау", start:"Бастау", confirm:"Тестті аяқтайсыз ба?", u_lbl:"Қатысушы",
         v1: "ЕСКЕРТУ! Тест терезесінен шығуға болмайды!",
         v2: "НАЗАР АУДАРЫҢЫЗ! Келесі жолы терезеден шықсаңыз, балл шегеріледі!",
         v3: (v, p) => `ЕРЕЖЕ БҰЗЫЛДЫ! \nТерезеден ауысу: ${v} \nАйыппұл: -${p} балл` },
    ru: { q:"Вопрос", v:"Нарушения", back:"Назад", next:"Далее", fin:"Завершить", start:"Начать", confirm:"Завершить тест?", u_lbl:"Участник",
         v1: "ВНИМАНИЕ! Не выходите из окна теста!",
         v2: "ВНИМАНИЕ! В следующий раз будут сняты баллы!",
         v3: (v, p) => `НАРУШЕНИЕ ПРАВИЛ! \nПереходов: ${v} \nСнято баллов: -${p}` }
};

let L = 'kz';
let state = { isStarted: false, isFinished: false, fn: "", ln: "", qs: [], ans: [], cur: 0, time: 1800, viol: 0 };
let timer;

window.onload = function() {
    const saved = localStorage.getItem('inf_quiz_2026');
    if (saved) {
        state = JSON.parse(saved);
        L = state.L || 'kz';
        setL(L);
        if (state.isFinished) showResult();
        else if (state.isStarted) resume();
    }
};

function setL(lang) {
    L = lang; state.L = lang;
    document.getElementById('btn-kz').style.opacity = L === 'kz' ? '1' : '0.5';
    document.getElementById('btn-ru').style.opacity = L === 'ru' ? '1' : '0.5';
    document.getElementById('p-btn').innerText = ui[L].back;
    document.getElementById('n-btn').innerText = ui[L].next;
    document.getElementById('f-btn').innerText = ui[L].fin;
    document.getElementById('txt-q').innerText = ui[L].q;
    document.getElementById('txt-v').innerText = ui[L].v;
    document.getElementById('btn-go').innerText = ui[L].start;
    updateUserTag();
}

function updateUserTag() {
    if(state.isStarted && !state.isFinished) {
        const tag = document.getElementById('user-tag');
        tag.innerText = `${ui[L].u_lbl}: ${state.ln} ${state.fn}`;
        tag.classList.remove('hidden');
    }
}

function init() {
    const f = document.getElementById('fn').value.trim();
    const l = document.getElementById('ln').value.trim();
    if (!f || !l) return alert(L === 'kz' ? "Аты-жөніңізді жазыңыз!" : "Введите ФИО!");
    state.fn = f; state.ln = l; state.isStarted = true;
    state.qs = [...db[L]].sort(() => 0.5 - Math.random()).slice(0, 20);
    state.ans = new Array(20).fill(null);
    state.time = 1800; state.viol = 0;
    save(); resume();
}

function resume() {
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    updateUserTag();
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        if (!state.isFinished) { state.time--; updateT(); save(); if (state.time <= 0) finish(); }
    }, 1000);
    render();
}

function updateT() {
    let m = Math.floor(state.time / 60), s = state.time % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

function render() {
    const q = state.qs[state.cur];
    document.getElementById('q-num').innerText = state.cur + 1;
    document.getElementById('q-text').innerText = q.q;
    const cont = document.getElementById('options'); cont.innerHTML = '';
    q.a.forEach((opt, i) => {
        const d = document.createElement('div');
        d.className = 'opt' + (state.ans[state.cur] === i ? ' sel' : '');
        d.innerText = opt;
        d.onclick = () => { state.ans[state.cur] = i; render(); save(); };
        cont.appendChild(d);
    });
    document.getElementById('p-btn').disabled = state.cur === 0;
    document.getElementById('n-btn').classList.toggle('hidden', state.cur === 19);
    document.getElementById('f-btn').classList.toggle('hidden', state.cur < 19);
    let p = (state.viol >= 3) ? (state.viol - 2) : 0;
    document.getElementById('v-count').innerText = `${state.viol} (Айыппұл: -${p})`;
}

function move(n) { state.cur += n; render(); save(); }
function preFinish() { if (confirm(ui[L].confirm)) finish(); }

function finish() {
    state.isFinished = true; state.isStarted = false;
    document.getElementById('user-tag').classList.add('hidden');
    clearInterval(timer); save(); showResult();
}

function showResult() {
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    let r = 0; state.ans.forEach((a, i) => { if (a === state.qs[i].c) r++; });
    let p = (state.viol >= 3) ? (state.viol - 2) : 0;
    let final = Math.max(0, r - p);
    document.getElementById('r-name').innerText = state.ln + " " + state.fn;
    document.getElementById('r-score').innerText = final;
    document.getElementById('r-info').innerHTML = L === 'kz' ? 
        `Тест балы: ${r} <br> Ереже бұзу: ${state.viol} <br> Шегерілді: ${p}` :
        `Балл теста: ${r} <br> Нарушений: ${state.viol} <br> Снято баллов: ${p}`;
}

function save() { localStorage.setItem('inf_quiz_2026', JSON.stringify(state)); }

function restart() {
    if (confirm(L === 'kz' ? "Қайта бастау?" : "Начать заново?")) {
        localStorage.removeItem('inf_quiz_2026');
        location.reload();
    }
}

window.onblur = function() {
    if (!state.isStarted || state.isFinished) return;
    state.viol++; save(); render();
    let p = (state.viol >= 3) ? (state.viol - 2) : 0;
    let msg = "";
    if (state.viol === 1) msg = ui[L].v1;
    else if (state.viol === 2) msg = ui[L].v2;
    else msg = ui[L].v3(state.viol, p);
    alert(msg);
};
</script>
</body>
</html>
