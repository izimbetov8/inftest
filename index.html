<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ - 2026</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; border-top: 6px solid var(--p); position: relative; }
        .hidden { display: none !important; }
        
        /* Жаңа стильдер: Тест барысындағы тақырып */
        .test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px; }
        #user-display { font-size: 18px; font-weight: bold; color: var(--p); text-align: left; }
        #timer { font-size: 24px; font-weight: bold; color: var(--d); border: 2px solid var(--d); padding: 5px 15px; border-radius: 10px; background: #fff5f5; margin: 0; }
        
        input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .opt { display: block; text-align: left; padding: 16px; margin: 12px 0; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .opt:hover { border-color: var(--p); background: #f0f7ff; }
        .sel { border-color: var(--p); background: #e1f0ff; font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .b-next { background: var(--p); } .b-prev { background: #95a5a6; } .b-fin { background: var(--s); }
        #v-msg { color: var(--d); font-weight: bold; margin-top: 20px; padding: 12px; background: #fff0f0; border-radius: 8px; border: 1px solid #fab1a0; }
        .res-card { background: #f8f9fa; border-radius: 15px; padding: 25px; margin: 20px 0; border: 1px solid #eee; }
        #r-score-big { font-size: 110px; font-weight: 900; color: var(--s); margin: 0; line-height: 1; }
        .res-row { display: flex; justify-content: space-around; margin-top: 25px; border-top: 2px solid #fff; padding-top: 20px; }
        .res-val { font-size: 32px; font-weight: 800; color: #2d3436; display: block; }
        .res-txt { font-size: 14px; color: #636e72; font-weight: 600; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="box">
    <div id="s-start">
        <h2 id="t-title">ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ - 2026</h2>
        <p id="t-desc">Сұрақ: 20 | Уақыт: 30 мин</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button type="button" onclick="setLanguage('kz')" id="btn-kz" style="background: #2980b9; flex: 1;">Қазақша</button>
            <button type="button" onclick="setLanguage('ru')" id="btn-ru" style="background: #34495e; flex: 1;">Русский</button>
        </div>

        <input type="text" id="ln" placeholder="Тегі / Фамилия">
        <input type="text" id="fn" placeholder="Аты / Имя">
        
        <button type="button" onclick="openInst()" id="btn-inst-main" style="background: #f39c12; margin-bottom: 10px; width: 100%;">Нұсқаулық / Инструкция</button>
        <button class="b-next" id="btn-start" onclick="start()" style="display: none; width: 100%;">Тестті бастау</button>
    </div>

    <div id="s-test" class="hidden">
        <div class="test-header">
            <div id="user-display"></div> <div id="timer">30:00</div>      </div>

        <div style="color: #7f8c8d; margin-bottom: 10px; text-align: left;">
            <span id="q-label">Сұрақ</span>: <span id="q-i">1</span> / 20
        </div>
        <h3 id="q-t" style="min-height: 60px; text-align: left;"></h3>
        <div id="opts"></div>
        
        <div class="btns">
            <button id="p-btn" class="b-prev" onclick="move(-1)">Артқа</button>
            <button id="n-btn" class="b-next" onclick="move(1)">Келесі</button>
            <button id="f-btn" class="b-fin hidden" onclick="openModal()">Аяқтау</button>
        </div>
        <p id="v-msg"><span id="v-label">Бұзушылықтар</span>: <span id="v-c">0</span></p>
    </div>

    <div id="s-res" class="hidden">
        <h3 id="r-n"></h3>
        <div class="res-card">
            <div id="res-lbl-total" style="font-weight: bold; color: #7f8c8d;">ЖАЛПЫ БАЛЛ</div>
            <div id="r-score-big">0</div>
            <div id="r-p" style="font-size: 24px; color: var(--p); font-weight: bold;">0%</div>
            <div class="res-row">
                <div class="res-item"><span class="res-val" id="r-raw">0</span><span class="res-txt" id="res-lbl-test">Тест балы</span></div>
                <div class="res-item" style="color: var(--d);"><span class="res-val" id="r-viol">0</span><span class="res-txt" id="res-lbl-viol">Бұзушылықтар</span></div>
                <div class="res-item"><span class="res-val" id="r-pen">0</span><span class="res-txt" id="res-lbl-pen">Шегерілді</span></div>
            </div>
        </div>
        <p style="color: #d63031; font-weight: bold; margin-top: 15px;" id="txt-done-msg"></p>
        <button class="b-next" onclick="location.reload()" style="max-width: 200px;">Қайта бастау</button>
    </div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3 id="m-title">Тестті аяқтауды растайсыз ба?</h3>
        <button class="b-fin" onclick="finish()" style="width: 100%;" id="m-btn">ИӘ</button>
    </div>
</div>

<div id="modal-inst" class="modal-overlay hidden">
    <div class="modal-card" style="text-align: left; width: 90%; max-width: 450px;">
        <h3 style="text-align: center;">Нұсқаулық / Инструкция</h3>
        <div id="inst-body" style="font-size: 15px; line-height: 1.5; margin: 15px 0;"></div>
        <button class="b-fin" onclick="closeInst()" style="width: 100%;">Түсінікті / Понятно</button>
    </div>
</div>

<script>
const db = {
    kz: [
        {q:"Python тілінде айнымалыны дұрыс жариялау тәсілін көрсетіңіз.", a:["var x = 10","x = 10","int x = 10","declare x = 10"], c:1},
        {q:"Python тілінде экранға мәтін шығару үшін қандай функция қолданылады?", a:["input()","print()","len()","type()"], c:1},
        {q:"Python тілінде қолданушыдан мәлімет енгізу үшін қандай функция қолданылады?", a:["print()","input()","len()","range()"], c:1},
        {q:"Python тілінде бүтін бөлу үшін қандай оператор қолданылады?", a:["/","//","%","**"], c:1},
        {q:"Python тілінде қалдықпен бөлу үшін қандай оператор қолданылады?", a:["/","//","%","**"], c:2},
        {q:"Python тілінде дәрежеге көтеру үшін қандай оператор қолданылады?", a:["^","**","%","//"], c:1},
        {q:"Python тілінде list (тізім) қандай жақшамен жазылады?", a:["()","{}","[]","<>"], c:2},
        {q:"Python тілінде len() функциясы не қайтарады?", a:["Айнымалы мәнін","Тізімнің ұзындығын","Типін","Файлды"], c:1},
        {q:"Python кодының нәтижесін табыңыз: print(2 ** 3)", a:["5","6","8","9"], c:2},
        {q:"Python кодының нәтижесін табыңыз: print(10 // 3)", a:["3","3.33","4","1"], c:0},
        {q:"HTML тілінде ең үлкен тақырыпты көрсету үшін қандай тег қолданылады?", a:["<h6>","<h1>","<p>","<title>"], c:1},
        {q:"HTML тілінде абзац жазу үшін қандай тег қолданылады?", a:["<div>","<p>","<h1>","<span>"], c:1},
        {q:"1010₂ екілік саны ондық санау жүйесінде неге тең?", a:["8","10","12","14"], c:1},
        {q:"15₁₀ саны екілік жүйеде қалай жазылады?", a:["1111","1010","1101","1001"], c:0},
        {q:"Логикалық AND операциясы екі мәнге қолданғанда нәтижесі 1 болу үшін қандай шарт орындалуы керек?", a:["Кемінде біреуі 1","Екеуі де 1","Екеуі де 0","Біреуі 0"], c:1},
        {q:"Логикалық OR операциясы екі мәнге қолданғанда нәтижесі 1 болу үшін қандай шарт орындалуы керек?", a:["Екеуі де 1","Кемінде біреуі 1","Екеуі де 0","Біреуі 0"], c:1},
        {q:"Компьютердің орталық процессоры (CPU) қандай қызмет атқарады?", a:["Ақпаратты сақтайды","Есептеулерді орындайды","Ақпаратты көрсетеді","Желіге қосады"], c:1},
        {q:"Интернет қандай желі түріне жатады?", a:["LAN","MAN","WAN","PAN"], c:2},
        {q:"Wi-Fi технологиясы нені білдіреді?", a:["Сымды желі","Сымсыз желі","Бағдарлама","Құрылғы"], c:1},
        {q:"Шифрлау дегеніміз не?", a:["Жою","Кодтау арқылы қорғау","Көшіру","Басып шығару"], c:1}
    ],
    ru: [
        {q:"Как правильно объявить переменную в Python?", a:["var x = 10","x = 10","int x = 10","declare x = 10"], c:1},
        {q:"Какая функция используется в Python для вывода текста на экран?", a:["input()","print()","len()","type()"], c:1},
        {q:"Какой оператор в Python для целочисленного деления?", a:["/","//","%","**"], c:1},
        {q:"Чему равно 1010₂ в десятичной системе?", a:["8","10","12","14"], c:1},
        {q:"Какой тег HTML для самого большого заголовка?", a:["<h6>","<h1>","<p>","<title>"], c:1}
        // ... (сұрақтар базасы)
    ]
};

const ui = {
    kz: { 
        title: "ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ - 2026 Еңбекшіқазақ ауданы", desc: "Сұрақ: 20 | Уақыт: 30 минут", start: "Тестті бастау", prev: "Артқа", next: "Келесі", fin: "Аяқтау", 
        viol: "Ереже бұзушылықтар", q_lbl: "Сұрақ", m_title: "Тестті аяқтауды растайсыз ба?", m_btn: "ИӘ", total: "ЖАЛПЫ БАЛЛ", 
        t_score: "Тест баллы", pen: "Шегерілген балл", done: "Тест аяқталды!",
        v1: "БАСҚА ТЕРЕЗЕГЕ АУЫСПАҢЫЗ!", v2: "НАЗАР АУДАРЫҢЫЗ КЕЛЕСІ АУЫСУДА БАЛЛ АЛЫНЫП ТАСТАЛАДЫ!",
        inst_text: "<b>Тест ережелері:</b><br>• Сұрақ саны: 20<br>• Уақыт: 30 минут<br>• <b>МАҢЫЗДЫ:</b> Басқа терезеге ауыспаңыз!<br>• 3-ші реттен бастап әр ауысу үшін 1 балл алынып тасталады."
    },
    ru: { 
        title: "ЛУЧШИЙ УЧИТЕЛЬ ИНФОРМАТИКИ - 2026 Енбекшиказахский район", desc: "Вопросов: 20 | Время: 30 минут", start: "Начать тест", prev: "Назад", next: "Далее", fin: "Завершить", 
        viol: "Нарушения правил", q_lbl: "Вопрос", m_title: "Подтверждаете завершение?", m_btn: "ДА", total: "ИТОГОВЫЙ БАЛЛ", 
        t_score: "Балл теста", pen: "Снято баллов", done: "Тест завершен!",
        v1: "НЕ ВЫХОДИТЕ ИЗ ОКНА!", v2: "ВНИМАНИЕ! СЛЕДУЮЩИЙ РАЗ БУДУТ СНЯТЫ БАЛЛЫ",
        inst_text: "<b>Правила теста:</b><br>• Количество вопросов: 20<br>• Время: 30 минут<br>• <b>ВАЖНО:</b> Не выходите из окна браузера!<br>• Начиная с 3-го нарушения, за каждый выход снимается 1 балл."
    }
};

let qs=[], cur=0, ans=[], timer, time=1800, viol=0, L='kz', isStarted=false, isFinished=false;

function setLanguage(lang) {
    L = lang;
    document.getElementById('t-title').innerText = ui[L].title;
    document.getElementById('t-desc').innerText = ui[L].desc;
    document.getElementById('btn-start').innerText = ui[L].start;
    document.getElementById('btn-kz').style.background = (lang === 'kz') ? '#2980b9' : '#34495e';
    document.getElementById('btn-ru').style.background = (lang === 'ru') ? '#2980b9' : '#34495e';
}

function openInst() {
    document.getElementById('inst-body').innerHTML = ui[L].inst_text;
    document.getElementById('modal-inst').classList.remove('hidden');
}

function closeInst() {
    document.getElementById('modal-inst').classList.add('hidden');
    document.getElementById('btn-start').style.display = "block";
}

function start() {
    let f=document.getElementById('fn').value.trim(), l=document.getElementById('ln').value.trim();
    if(!f || !l) return alert(L==='kz'?"Аты-жөніңізді жазыңыз!":"Введите ФИО!");
    
    qs = [...db[L]].sort(()=>0.5-Math.random()).slice(0, 20);
    ans = new Array(20).fill(null);
    isStarted = true;
    
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    
    // Аты-жөнін интерфейске шығару
    document.getElementById('user-display').innerText = l + " " + f;

    timer = setInterval(() => { 
        if(!isFinished) { 
            time--; 
            updateT(); 
            if(time<=0) finish(); 
        } 
    }, 1000);
    render();
}

function updateT() {
    let m=Math.floor(time/60), s=time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
}

function render() {
    const t = ui[L];
    document.getElementById('q-i').innerText = cur+1;
    document.getElementById('q-t').innerText = qs[cur].q;
    document.getElementById('p-btn').innerText = t.prev;
    document.getElementById('n-btn').innerText = t.next;
    document.getElementById('f-btn').innerText = t.fin;
    document.getElementById('q-label').innerText = t.q_lbl;
    document.getElementById('v-label').innerText = t.viol;
    
    let b = document.getElementById('opts'); b.innerHTML='';
    qs[cur].a.forEach((o,i)=>{
        let d=document.createElement('div'); d.className='opt' + (ans[cur]===i?' sel':'');
        d.innerText=o; d.onclick=()=>{ans[cur]=i; render();}; b.appendChild(d);
    });
    
    document.getElementById('p-btn').disabled = (cur===0);
    document.getElementById('n-btn').classList.toggle('hidden', cur===19);
    document.getElementById('f-btn').classList.toggle('hidden', cur<19);
    document.getElementById('v-c').innerText = viol;
}

function move(n) { cur+=n; render(); }
function openModal() { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function finish() {
    isFinished = true; isStarted = false; clearInterval(timer); closeModal();
    let r = 0; ans.forEach((a, i) => { if (a === qs[i].c) r++; }); 
    let p = (viol >= 3) ? (viol - 2) : 0;
    let finalScore = Math.max(0, r-p);

    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    
    const t = ui[L];
    document.getElementById('r-n').innerText = document.getElementById('ln').value + " " + document.getElementById('fn').value;
    document.getElementById('r-score-big').innerText = finalScore;
    document.getElementById('r-p').innerText = Math.round((finalScore/20)*100) + "%";
    document.getElementById('r-raw').innerText = r;
    document.getElementById('r-viol').innerText = viol;
    document.getElementById('r-pen').innerText = p;
    
    document.getElementById('res-lbl-total').innerText = t.total;
    document.getElementById('res-lbl-test').innerText = t.t_score;
    document.getElementById('res-lbl-viol').innerText = t.viol;
    document.getElementById('res-lbl-pen').innerText = t.pen;
    document.getElementById('txt-done-msg').innerText = t.done;
}

// ЕРЕЖЕ БҰЗУДЫ БАҚЫЛАУ (BLUR)
window.onblur = function() {
    if(!isStarted || isFinished || !document.getElementById('modal').classList.contains('hidden')) return;
    
    viol++; 
    document.getElementById('v-c').innerText = viol; 
    
    let penalty = (viol >= 3) ? (viol - 2) : 0;
    let msg = "";
    
    if (viol === 1) {
        msg = ui[L].v1;
    } else if (viol === 2) {
        msg = ui[L].v2;
    } else {
        msg = (L === 'kz') 
            ? `НАЗАР АУДАРЫҢЫЗ! \nБұл ${viol}-ші рет ереже бұзу. \nЖалпы шегерілген балл сомасы: ${penalty}`
            : `ВНИМАНИЕ! \nЭто ${viol}-е нарушение. \nОбщая сумма снятых баллов: ${penalty}`;
    }
    
    alert(msg);
}

window.onload = () => { setLanguage('kz'); };
</script>
</body>
</html>
