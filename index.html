<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatics Final Exam</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; border-top: 6px solid var(--p); position: relative; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #timer { font-size: 28px; font-weight: bold; color: var(--d); border: 3px solid var(--d); padding: 10px 25px; border-radius: 12px; display: inline-block; margin-bottom: 25px; background: #fff5f5; }
        .opt { display: block; text-align: left; padding: 16px; margin: 12px 0; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .opt:hover { border-color: var(--p); background: #f0f7ff; }
        .sel { border-color: var(--p); background: #e1f0ff; font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .b-next { background: var(--p); } .b-prev { background: #95a5a6; } .b-fin { background: var(--s); }
        #v-msg { color: var(--d); font-weight: bold; margin-top: 20px; padding: 12px; background: #fff0f0; border-radius: 8px; border: 1px solid #fab1a0; }
        .res-card { background: #f8f9fa; border-radius: 15px; padding: 25px; margin: 20px 0; border: 1px solid #eee; }
        #r-score-big { font-size: 110px; font-weight: 900; color: var(--s); margin: 0; line-height: 1; }
        .res-row { display: flex; justify-content: space-around; margin-top: 25px; border-top: 2px solid #fff; padding-top: 20px; }
        .res-val { font-size: 32px; font-weight: 800; color: #2d3436; display: block; }
        .res-txt { font-size: 14px; color: #636e72; font-weight: 600; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="box">
    <div id="s-start">
        <h2 id="t-title">ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ- 2026</h2>
        <p id="t-desc">Questions: 20 | Time: 30 min</p>
        <select id="lang" onchange="updateUI()"><option value="kz">Қазақ тілі</option><option value="ru">Русский язык</option></select>
        <input type="text" id="ln" placeholder="Тегі (Фамилия)"><input type="text" id="fn" placeholder="Аты (Имя)">
        <button class="b-next" id="btn-start" onclick="start()">Тестті бастау</button>
    </div>

    <div id="s-test" class="hidden">
        <div id="timer">30:00</div>
        <div style="color: #7f8c8d; margin-bottom: 10px;"><span id="q-label">Сұрақ</span>: <span id="q-i">1</span> / 20</div>
        <h3 id="q-t" style="min-height: 60px;"></h3>
        <div id="opts"></div>
        <div class="btns">
            <button id="p-btn" class="b-prev" onclick="move(-1)">Артқа</button>
            <button id="n-btn" class="b-next" onclick="move(1)">Келесі</button>
            <button id="f-btn" class="b-fin hidden" onclick="openModal()">Аяқтау</button>
        </div>
        <p id="v-msg"><span id="v-label">Бұзушылықтар</span>: <span id="v-c">0</span></p>
    </div>

    <div id="s-res" class="hidden">
        <h3 id="r-n"></h3>
        <div class="res-card">
            <div id="res-lbl-total" style="font-weight: bold; color: #7f8c8d;">ЖАЛПЫ БАЛЛ / ОБЩИЙ БАЛЛ</div>
            <div id="r-score-big">0</div>
            <div id="r-p" style="font-size: 24px; color: var(--p); font-weight: bold;">0%</div>
            <div class="res-row">
                <div class="res-item"><span class="res-val" id="r-raw">0</span><span class="res-txt" id="res-lbl-test">Тест балы</span></div>
                <div class="res-item" style="color: var(--d);"><span class="res-val" id="r-viol">0</span><span class="res-txt" id="res-lbl-viol">Бұзушылықтар / Нарушения</span></div>
                <div class="res-item"><span class="res-val" id="r-pen">0</span><span class="res-txt" id="res-lbl-pen">Шегерілді / Снято баллов</span></div>
            </div>
        </div>
        <p style="color: #d63031; font-weight: bold; margin-top: 15px;" id="txt-done-msg"></p>
    </div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3 id="m-title">Тестті аяқтауды растайсыз ба? / Подверждаете завершение теста?</h3>
        <button class="b-fin" onclick="finish()" style="width: 100%;" id="m-btn">ИӘ / ДА</button>
    </div>
</div>

<script>
// Сұрақтар базасы өзгеріссіз қалады
const db = {
    kz: [
        {q:"1011(2) екілік саны ондық жүйеде нешеге тең?", a:["9","11","13","15"], c:1},
        {q:"Сегіздік жүйедегі 17(8) санынан кейін тікелей келетін сан?", a:["18","20","21","22"], c:1},
        {q:"Python программалау тілінде қалдықты табу операторы?", a:["//","%","**","/"], c:1},
        {q:"HTML құжатындағы ең үлкен деңгейлі тақырып тегі?", a:["<h6>","<head>","<h1>","<header>"], c:2},
        {q:"Логикалық 'ЖӘНЕ' (AND) амалы қалай аталады?", a:["Дизъюнкция","Конъюнкция","Инверсия","Импликация"], c:1},
        {q:"1 Гбайт көлемінде неше Мбайт бар?", a:["1000","1024","1048","2048"], c:1},
        {q:"Python-да тізімнің (list) соңына элемент қосу әдісі?", a:["add()","append()","insert()","extend()"], c:1},
        {q:"Логикалық терістеу (NOT) амалының белгісі?", a:["∧","∨","¬","→"], c:2},
        {q:"Компьютердегі ақпарат өлшеудің ең кіші бірлігі?", a:["1 Байт","1 Килобайт","1 Бит","1 Мегабайт"], c:2},
        {q:"HTML-де гиперсілтеме жасау үшін қолданылатын тег?", a:["<link>","<a>","<href>","<nav>"], c:1},
        {q:"Python-да print(2**3) кодының нәтижесі?", a:["5","6","8","9"], c:2},
        {q:"Сегіздік санау жүйесінің негізі нешеге тең?", a:["2","8","10","16"], c:1},
        {q:"HTML-де кестенің жолын анықтайтын тег?", a:["<td>","<th>","<tr>","<table>"], c:2},
        {q:"A=True, B=False болса, 'A AND B' мәні?", a:["True","False","None","Error"], c:1},
        {q:"Python-да мәлімет енгізу функциясы?", a:["print()","input()","read()","get()"], c:1},
        {q:"HTML файлының стандартты кеңейтілімі?", a:[".txt",".html",".css",".js"], c:1},
        {q:"Он алтылық жүйедегі 10(16) саны ондық жүйеде?", a:["10","16","20","32"], c:1},
        {q:"Жедел жады қалай аталады?", a:["ROM","RAM","HDD","SSD"], c:1},
        {q:"Python тілінің авторы кім?", a:["Билл Гейтс","Гвидо ван Россум","Стив Джобс","Марк Цукерберг"], c:1},
        {q:"HTML-де мәтінді келесі жолға көшіру тегі?", a:["<next>","<br>","<hr>","<p>"], c:1}
    ],
    ru: [
        {q:"Чему равно двоичное число 1011(2) в десятичной системе?", a:["9","11","13","15"], c:1},
        {q:"Какое число следует за 17(8) в восьмеричной системе?", a:["18","20","21","22"], c:1},
        {q:"Оператор нахождения остатка от деления в Python?", a:["//","%","**","/"], c:1},
        {q:"Тег самого крупного заголовка в HTML?", a:["<h6>","<head>","<h1>","<header>"], c:2},
        {q:"Как называется логическая операция 'И' (AND)?", a:["Дизъюнкция","Конъюнкция","Инверсия","Импликация"], c:1},
        {q:"Сколько Мбайт в 1 Гбайте?", a:["1000","1024","1048","2048"], c:1},
        {q:"Метод добавления элемента в конец списка в Python?", a:["add()","append()","insert()","extend()"], c:1},
        {q:"Символ логического отрицания (NOT)?", a:["∧","∨","¬","→"], c:2},
        {q:"Минимальная единица измерения информации?", a:["1 Байт","1 Килобайт","1 Бит","1 Мегабайт"], c:2},
        {q:"Тег HTML для создания гиперссылок?", a:["<link>","<a>","<href>","<nav>"], c:1},
        {q:"Результат выполнения print(2**3) в Python?", a:["5","6","8","9"], c:2},
        {q:"Основание восьмеричной системы счисления?", a:["2","8","10","16"], c:1},
        {q:"Тег HTML для строки таблицы?", a:["<td>","<th>","<tr>","<table>"], c:2},
        {q:"Если A=True, B=False, чему равно 'A AND B'?", a:["True","False","None","Error"], c:1},
        {q:"Функция в Python для ввода данных?", a:["print()","input()","read()","get()"], c:1},
        {q:"Стандартное расширение файлов HTML?", a:[".txt",".html",".css",".js"], c:1},
        {q:"Чему равно число 10(16) в десятичной системе?", a:["10","16","20","32"], c:1},
        {q:"Как называется оперативная память?", a:["ROM","RAM","HDD","SSD"], c:1},
        {q:"Кто создал язык Python?", a:["Билл Гейтс","Гвидо ван Россум","Стив Джобс","Марк Цукерберг"], c:1},
        {q:"Тег HTML для переноса строки?", a:["<next>","<br>","<hr>","<p>"], c:1}
    ]
};

const ui = {
    kz: { 
        title: "ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ- 2026", desc: "Сұрақ: 20 | Уақыт: 30 мин", start: "Тестті бастау", prev: "Артқа", next: "Келесі", fin: "Аяқтау", 
        viol: "Бұзушылықтар", q_lbl: "Сұрақ", m_title: "Аяқтауды растайсыз ба?", m_btn: "ИӘ", total: "ЖАЛПЫ БАЛЛ", 
        t_score: "Тест балы", pen: "Шегерілді", done: "Тест аяқталды!",
        v1: "БАСҚА ТЕРЕЗЕГЕ АУЫСПАҢЫЗ!", v2: "НАЗАР АУДАРЫҢЫЗ 3-РЕТ БАСҚА ТЕРЕЗЕГЕ АУЫССАҢЫЗ БАЛЛ ШЕГЕРІЛЕДІ!", v3: "БҰЗУШЫЛЫҚ! Балл шегерілді."
    },
    ru: { 
        title: "Лучший учитель информатики - 2026", desc: "Вопросов: 20 | Время: 30 мин", start: "Начать тест", prev: "Назад", next: "Далее", fin: "Завершить", 
        viol: "Нарушения", q_lbl: "Вопрос", m_title: "Подтверждаете завершение?", m_btn: "ДА", total: "ИТОГОВЫЙ БАЛЛ", 
        t_score: "Балл теста", pen: "Снято баллов", done: "Тест завершен!",
        v1: "НЕ ВЫХОДИТЕ ИЗ ОКНА!", v2: "ВНИМАНИЕ! НЕ ВЫХОДИТЕ ИЗ ОКНА! СЛУДУЮЩИЙ РАЗ БУДУТ СНЯТЫ БАЛЛЫ", v3: "НАРУШЕНИЕ! Баллы сняты."
    }
};

let qs=[], cur=0, ans=[], timer, time=1800, viol=0, L='kz', isStarted=false, isFinished=false;

function updateUI() {
    L = document.getElementById('lang').value;
    const t = ui[L];
    document.getElementById('t-title').innerText = t.title;
    document.getElementById('t-desc').innerText = t.desc;
    document.getElementById('btn-start').innerText = t.start;
    document.getElementById('p-btn').innerText = t.prev;
    document.getElementById('n-btn').innerText = t.next;
    document.getElementById('f-btn').innerText = t.fin;
    document.getElementById('v-label').innerText = t.viol;
    document.getElementById('q-label').innerText = t.q_lbl;
    document.getElementById('m-title').innerText = t.m_title;
    document.getElementById('m-btn').innerText = t.m_btn;
    document.getElementById('res-lbl-total').innerText = t.total;
    document.getElementById('res-lbl-test').innerText = t.t_score;
    document.getElementById('res-lbl-viol').innerText = t.viol;
    document.getElementById('res-lbl-pen').innerText = t.pen;
    document.getElementById('txt-done-msg').innerText = t.done;
}

function saveState(final = false) {
    if(final) {
        let r=0; ans.forEach((a,i)=>{if(a===qs[i].c) r++;});
        let p = (viol >= 3) ? (viol - 2) : 0;
        localStorage.setItem('quiz_result', JSON.stringify({ fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, r, p, viol, L }));
        localStorage.removeItem('quiz_progress');
        return;
    }
    localStorage.setItem('quiz_progress', JSON.stringify({ qs, cur, ans, time, viol, L, fn: document.getElementById('fn').value, ln: document.getElementById('ln').value }));
}

function loadState() {
    const res = localStorage.getItem('quiz_result');
    if(res) { showResult(JSON.parse(res)); return; }
    const saved = localStorage.getItem('quiz_progress');
    if(saved) {
        const d = JSON.parse(saved);
        qs = d.qs; cur = d.cur; ans = d.ans; time = d.time; viol = d.viol; L = d.L;
        document.getElementById('fn').value = d.fn; document.getElementById('ln').value = d.ln;
        document.getElementById('lang').value = L;
        updateUI(); start(true);
    } else { updateUI(); }
}

function start(resume = false) {
    if(!resume) {
        let f=document.getElementById('fn').value.trim(), l=document.getElementById('ln').value.trim();
        if(!f || !l) return alert(L==='kz'?"Аты-жөніңізді жазыңыз!":"Введите ФИО!");
        qs = [...db[L]].sort(()=>0.5-Math.random()).slice(0, 20);
        ans = new Array(20).fill(null);
    }
    isStarted = true;
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    timer = setInterval(() => { if(!isFinished) { time--; updateT(); saveState(); if(time<=0) finish(); } }, 1000);
    render();
}

function updateT() {
    let m=Math.floor(time/60), s=time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
}

function render() {
    document.getElementById('q-i').innerText = cur+1;
    document.getElementById('q-t').innerText = qs[cur].q;
    let b = document.getElementById('opts'); b.innerHTML='';
    qs[cur].a.forEach((o,i)=>{
        let d=document.createElement('div'); d.className='opt'+(ans[cur]===i?' sel':'');
        d.innerText=o; d.onclick=()=>{ans[cur]=i; render(); saveState();}; b.appendChild(d);
    });
    document.getElementById('p-btn').disabled = (cur===0);
    document.getElementById('n-btn').classList.toggle('hidden', cur===19);
    document.getElementById('f-btn').classList.toggle('hidden', cur<19);
    document.getElementById('v-c').innerText = viol;
}

function move(n) { cur+=n; render(); saveState(); }
function openModal() { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function finish() {
    isFinished = true; isStarted = false;
    clearInterval(timer); closeModal();
    saveState(true); loadState();
}

function showResult(d) {
    L = d.L; updateUI();
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    document.getElementById('r-n').innerText = d.ln + " " + d.fn;
    document.getElementById('r-score-big').innerText = Math.max(0, d.r - d.p);
    document.getElementById('r-p').innerText = Math.round((Math.max(0, d.r - d.p)/20)*100) + "%";
    document.getElementById('r-raw').innerText = d.r;
    document.getElementById('r-viol').innerText = d.viol;
    document.getElementById('r-pen').innerText = d.p;
}

window.onblur = function() {
    if(!isStarted || isFinished || !document.getElementById('modal').classList.contains('hidden')) return;
    viol++; document.getElementById('v-c').innerText = viol; saveState();
    alert((viol === 1) ? ui[L].v1 : (viol === 2 ? ui[L].v2 : ui[L].v3));
}

window.onload = loadState;
</script>
</body>
</html>
