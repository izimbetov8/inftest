<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информатика Тест - 2026</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; border-top: 6px solid var(--p); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #timer { font-size: 24px; font-weight: bold; color: var(--d); margin-bottom: 20px; padding: 10px; border: 2px solid var(--d); border-radius: 10px; display: inline-block; }
        .opt { display: block; text-align: left; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .opt:hover { background: #f0f7ff; border-color: var(--p); }
        .sel { background: #e1f0ff; border-color: var(--p); font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .b-next { background: var(--p); }
        .b-prev { background: #95a5a6; }
        .b-fin { background: var(--s); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="box">
    <div id="s-start">
        <h2>ИНФОРМАТИКА ТЕСТІ</h2>
        <p>Аты-жөніңізді енгізіп, тестті бастаңыз</p>
        <input type="text" id="ln" placeholder="Тегі">
        <input type="text" id="fn" placeholder="Аты">
        <button class="b-next" onclick="startTest()" style="width: 100%;">Бастау</button>
    </div>

    <div id="s-test" class="hidden">
        <div id="timer">30:00</div>
        <div id="q-info" style="margin-bottom: 10px; color: #667;">Сұрақ: <span id="cur-q">1</span> / 20</div>
        <h3 id="q-text"></h3>
        <div id="options"></div>
        <div class="btns">
            <button id="btn-p" class="b-prev" onclick="changeQ(-1)">Артқа</button>
            <button id="btn-n" class="b-next" onclick="changeQ(1)">Келесі</button>
            <button id="btn-f" class="b-fin hidden" onclick="finishTest()">Аяқтау</button>
        </div>
    </div>

    <div id="s-res" class="hidden">
        <h2 id="res-name"></h2>
        <div style="font-size: 50px; font-weight: bold; color: var(--s);" id="res-score">0 / 20</div>
        <p id="res-detail"></p>
        <button class="b-next" onclick="resetAll()">Қайта бастау</button>
    </div>
</div>

<script>
// Тест сұрақтары (үлгі ретінде 5 сұрақ, сіз бұрынғы 50 сұрақты осында қоссаңыз болады)
const questionsData = [
    {q: "Python-да экранға шығару функциясы?", a: ["print()", "input()", "out()", "write()"], c: 0},
    {q: "Ең кіші ақпарат өлшем бірлігі?", a: ["Байт", "Кбайт", "Бит", "Мбайт"], c: 2},
    {q: "HTML-де тақырып тегі?", a: ["<p>", "<h1>", "<a>", "<div>"], c: 1},
    {q: "Процессордың негізгі сипаттамасы?", a: ["Салмағы", "Жиілігі", "Түсі", "Көлемі"], c: 1},
    {q: "Екілік жүйедегі сандар?", a: ["1,2", "0,1", "A,B", "0-9"], c: 1}
];

let state = {
    isStarted: false,
    isFinished: false,
    fn: "", ln: "",
    qs: [], // Араластырылған сұрақтар
    ans: [], // Пайдаланушы жауаптары
    cur: 0,
    time: 1800,
    viol: 0
};

let timerInterval;

// ЖАДҚА САҚТАУ
function saveToStorage() {
    localStorage.setItem('quiz_state_2026', JSON.stringify(state));
}

// ЖАДТАН ЖҮКТЕУ
function loadFromStorage() {
    const saved = localStorage.getItem('quiz_state_2026');
    if (saved) {
        state = JSON.parse(saved);
        if (state.isFinished) {
            showResult();
        } else if (state.isStarted) {
            resumeTest();
        }
    }
}

function startTest() {
    const fn = document.getElementById('fn').value.trim();
    const ln = document.getElementById('ln').value.trim();
    if (!fn || !ln) return alert("Аты-жөніңізді толық жазыңыз!");

    state.fn = fn; state.ln = ln;
    state.isStarted = true;
    state.qs = [...questionsData].sort(() => 0.5 - Math.random()).slice(0, 20);
    state.ans = new Array(20).fill(null);
    
    resumeTest();
}

function resumeTest() {
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    
    startTimer();
    renderQuestion();
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        state.time--;
        updateTimerDisplay();
        saveToStorage();
        if (state.time <= 0) finishTest();
    }, 1000);
}

function updateTimerDisplay() {
    let m = Math.floor(state.time / 60);
    let s = state.time % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

function renderQuestion() {
    const qObj = state.qs[state.cur];
    document.getElementById('cur-q').innerText = state.cur + 1;
    document.getElementById('q-text').innerText = qObj.q;
    
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    
    qObj.a.forEach((opt, index) => {
        const div = document.createElement('div');
        div.className = 'opt' + (state.ans[state.cur] === index ? ' sel' : '');
        div.innerText = opt;
        div.onclick = () => {
            state.ans[state.cur] = index;
            renderQuestion();
            saveToStorage();
        };
        optDiv.appendChild(div);
    });

    document.getElementById('btn-p').disabled = state.cur === 0;
    document.getElementById('btn-n').classList.toggle('hidden', state.cur === 19);
    document.getElementById('btn-f').classList.toggle('hidden', state.cur < 19);
}

function changeQ(dir) {
    state.cur += dir;
    renderQuestion();
    saveToStorage();
}

function finishTest() {
    state.isFinished = true;
    state.isStarted = false;
    clearInterval(timerInterval);
    saveToStorage();
    showResult();
}

function showResult() {
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    
    let correct = 0;
    state.ans.forEach((a, i) => {
        if (a === state.qs[i].c) correct++;
    });

    document.getElementById('res-name').innerText = `${state.ln} ${state.fn}`;
    document.getElementById('res-score').innerText = `${correct} / 20`;
    document.getElementById('res-detail').innerText = `Қателіктер (терезеден шығу): ${state.viol}`;
}

function resetAll() {
    if (confirm("Барлық деректерді өшіріп, қайта бастайсыз ба?")) {
        localStorage.removeItem('quiz_state_2026');
        location.reload();
    }
}

// Терезеден шыққанды бақылау
window.onblur = function() {
    if (state.isStarted && !state.isFinished) {
        state.viol++;
        saveToStorage();
        alert("Ескерту! Тест терезесінен шықпаңыз!");
    }
};

// Бет жүктелгенде тексеру
window.onload = loadFromStorage;
</script>

</body>
</html>
