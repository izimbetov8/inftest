<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҮЗДІК ИНФОРМАТИКА ПӘНІ МҰҒАЛІМІ - 2026</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 800px; text-align: center; border-top: 6px solid var(--p); position: relative; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        /* Жоғарғы панель стилі */
        .test-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f2f6;
        }
        #user-info-display {
            grid-column: 2;
            font-weight: 800;
            color: var(--p);
            font-size: 18px;
            text-transform: uppercase;
        }
        #timer {
            grid-column: 3;
            justify-self: end;
            font-size: 18px;
            font-weight: bold;
            color: var(--d);
            border: 2px solid var(--d);
            padding: 5px 15px;
            border-radius: 8px;
            background: #fff5f5;
        }

        .opt { display: block; text-align: left; padding: 16px; margin: 12px 0; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .opt:hover { border-color: var(--p); background: #f0f7ff; }
        .sel { border-color: var(--p); background: #e1f0ff; font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .b-next { background: var(--p); } .b-prev { background: #95a5a6; } .b-fin { background: var(--s); }
        #v-msg { color: var(--d); font-weight: bold; margin-top: 20px; padding: 12px; background: #fff0f0; border-radius: 8px; border: 1px solid #fab1a0; }
        .res-card { background: #f8f9fa; border-radius: 15px; padding: 25px; margin: 20px 0; border: 1px solid #eee; }
        #r-score-big { font-size: 110px; font-weight: 900; color: var(--s); margin: 0; line-height: 1; }
        .res-row { display: flex; justify-content: space-around; margin-top: 25px; border-top: 2px solid #fff; padding-top: 20px; }
        .res-val { font-size: 32px; font-weight: 800; color: #2d3436; display: block; }
        .res-txt { font-size: 14px; color: #636e72; font-weight: 600; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
    </style>
</head>

    <button class="b-next" id="btn-start" onclick="start()" style="display: none; width: 100%;">Тестті бастау</button>
</div>

    <div id="s-test" class="hidden">
        <div class="test-header">
            <div></div>
            <div id="user-info-display"></div>
            <div id="timer">30:00</div>
        </div>
        <div style="color: #7f8c8d; margin-bottom: 10px;"><span id="q-label">Сұрақ</span>: <span id="q-i">1</span> / 20</div>
        <h3 id="q-t" style="min-height: 60px;"></h3>
        <div id="opts"></div>
        <div class="btns">
            <button id="p-btn" class="b-prev" onclick="move(-1)">Артқа</button>
            <button id="n-btn" class="b-next" onclick="move(1)">Келесі</button>
            <button id="f-btn" class="b-fin hidden" onclick="openModal()">Аяқтау</button>
        </div>
        <p id="v-msg">
            <span id="v-label">Бұзушылықтар</span>: <span id="v-c">0</span> 
            <span id="pen-info" style="display:none; margin-left:15px; color:#e74c3c; padding: 2px 8px; border-left: 2px solid #ddd;">
        ⚠️ <span id="pen-txt">Шегерілген балл</span>: <span id="pen-count" style="font-weight:900; font-size:1.2em;">0</span>
            </span>
        </p>
    </div>

    <div id="s-res" class="hidden">
        <h3 id="r-n"></h3>
        <div class="res-card">
            <div id="res-lbl-total" style="font-weight: bold; color: #7f8c8d;">ЖАЛПЫ БАЛЛ</div>
            <div id="r-score-big">0</div>
            <div id="r-p" style="font-size: 24px; color: var(--p); font-weight: bold;">0%</div>
            <div class="res-row">
                <div class="res-item"><span class="res-val" id="r-raw">0</span><span class="res-txt" id="res-lbl-test">Тест балы</span></div>
                <div class="res-item" style="color: var(--d);"><span class="res-val" id="r-viol">0</span><span class="res-txt" id="res-lbl-viol">Бұзушылықтар</span></div>
                <div class="res-item"><span class="res-val" id="r-pen">0</span><span class="res-txt" id="res-lbl-pen">Шегерілді</span></div>
            </div>
        </div>
        <p style="color: #d63031; font-weight: bold; margin-top: 15px;" id="txt-done-msg"></p>
    </div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3 id="m-title">Тестті аяқтауды растайсыз ба?</h3>
        <button class="b-fin" onclick="finish()" style="width: 100%;" id="m-btn">ИӘ</button>
    </div>
</div>

<div id="modal-inst" class="modal-overlay hidden">

</div>

    document.getElementById('btn-start').innerText = t.start;
    document.getElementById('p-btn').innerText = t.prev;
    document.getElementById('n-btn').innerText = t.next;
    document.getElementById('f-btn').innerText = t.fin;
    document.getElementById('v-label').innerText = t.viol;
    document.getElementById('q-label').innerText = t.q_lbl;
    document.getElementById('m-title').innerText = t.m_title;
    document.getElementById('m-btn').innerText = t.m_btn;
    document.getElementById('res-lbl-total').innerText = t.total;
    document.getElementById('res-lbl-test').innerText = t.t_score;
    document.getElementById('res-lbl-viol').innerText = t.viol;
    document.getElementById('res-lbl-pen').innerText = t.pen;
    document.getElementById('txt-done-msg').innerText = t.done;
    document.getElementById('pen-txt').innerText = t.pen_label;
}

function setLanguage(lang) {
    L = lang; updateUI();
    document.getElementById('btn-kz').style.background = (lang === 'kz') ? '#2980b9' : '#34495e';
    document.getElementById('btn-ru').style.background = (lang === 'ru') ? '#2980b9' : '#34495e';
}

function openInst() {
    document.getElementById('inst-body').innerHTML = ui[L].inst_text;
    document.getElementById('modal-inst').classList.remove('hidden');
}

function closeInst() {
    document.getElementById('modal-inst').classList.add('hidden');
    // Бұл жерден батырманы көрсетуді алып тастадық, 
    // себебі оны тек checkPass() көрсетуі тиіс.
    checkPass(); 
}

// ПАРАҚШАНЫ ЖАҢАРТҚАНДА ДЕРЕКТЕРДІ САҚТАУ
function saveProgress() {
    if (isStarted && !isFinished) {
        const data = {
            qs, cur, ans, time, viol, L,
            fn: document.getElementById('fn').value,
            ln: document.getElementById('ln').value
        };
        localStorage.setItem('quiz_progress', JSON.stringify(data));
    }
}

function loadProgress() {
    const result = localStorage.getItem('quiz_result');
    if (result) {
        showResult(JSON.parse(result));
        return;
    }

    const saved = localStorage.getItem('quiz_progress');
    if (saved) {
        const d = JSON.parse(saved);
        // Сақталған деректерді айнымалыларға жүктеу
        qs = d.qs; cur = d.cur; ans = d.ans; time = d.time; viol = d.viol; L = d.L;
        
        document.getElementById('fn').value = d.fn || "";
        document.getElementById('ln').value = d.ln || "";
        setLanguage(L);
        
        isStarted = true;
        document.getElementById('s-start').classList.add('hidden');
        document.getElementById('s-test').classList.remove('hidden');
        document.getElementById('user-info-display').innerText = (d.ln || "") + " " + (d.fn || "");
        
        // --- МАҢЫЗДЫ: Шегерілген баллдарды қайта қалпына келтіру ---
        document.getElementById('v-c').innerText = viol;
        const penalty = (viol >= 3) ? (viol - 2) : 0;
        if (penalty > 0) {
            document.getElementById('pen-info').style.display = "inline";
            document.getElementById('pen-count').innerText = penalty;
        }
        // -------------------------------------------------------

        if(timer) clearInterval(timer);
        timer = setInterval(() => { 
            if(!isFinished) { 
                time--; updateT(); 
                if(time<=0) finish(); 
                saveProgress(); 
            } 
        }, 1000);
        
        render();
    } else {
        updateUI();
    }
}

function checkPass() {
    const correctPass = "2036"; 
    const inputPass = document.getElementById('pass-input').value.trim();
    const btnStart = document.getElementById('btn-start');

    // Тек 2026 жазылса ғана батырма пайда болады
    if (inputPass === correctPass) {
        btnStart.style.display = "block";
    } else {
        btnStart.style.display = "none";
    }
}
    
function start(resume = false) {
    let f=document.getElementById('fn').value.trim(), l=document.getElementById('ln').value.trim();
    if(!f || !l) return alert(L==='kz'?"Аты-жөніңізді жазыңыз!":"Введите ФИО!");
    
    document.getElementById('user-info-display').innerText = l + " " + f;
    
    if(!resume) {
        qs = [...db[L]].sort(()=>0.5-Math.random()).slice(0, 20);
        ans = new Array(20).fill(null);
        viol = 0; // Жаңа тест басталғанда нөлге қою
    }
    
    isStarted = true; // Бұл өте маңызды!
    isFinished = false;
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    
    if(timer) clearInterval(timer);
    timer = setInterval(() => { 
        if(!isFinished) { 
            time--; updateT(); 
            if(time<=0) finish(); 
        } 
    }, 1000);
    render();
}

function updateT() {
    let m=Math.floor(time/60), s=time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
}

function render() {
    document.getElementById('q-i').innerText = cur+1;
    document.getElementById('q-t').innerText = qs[cur].q;
    let b = document.getElementById('opts'); b.innerHTML='';
    qs[cur].a.forEach((o,i)=>{
        let d=document.createElement('div'); d.className='opt'+(ans[cur]===i?' sel':'');
        d.innerText=o; 
        d.onclick=()=>{
            if(!isFinished){
                ans[cur]=i; 
                saveProgress(); // Жауап таңдалғанда сақтаймыз
                render();
            }
        }; 
        b.appendChild(d);
    });
    document.getElementById('p-btn').disabled = (cur===0);
    document.getElementById('n-btn').classList.toggle('hidden', cur===19);
    document.getElementById('f-btn').classList.toggle('hidden', cur<19);
    document.getElementById('v-c').innerText = viol;
    
    saveProgress(); // Сұрақ ауысқан сайын сақтаймыз
}

function move(n) { if(!isFinished) { cur+=n; render(); } }
function openModal() { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function finish() {
    const answeredCount = ans.filter(a => a !== null).length;
    if (answeredCount < 20) {
        const msg = (L === 'kz') 
            ? `Барлық сұраққа жауап беріңіз! (Орындалғаны: ${answeredCount}/20)` 
            : `Ответьте на все вопросы! (Выполнено: ${answeredCount}/20)`;
        
        isPaused = true; // Мұны қосу "бұзушылық" болып есептелуінен қорғайды
        alert(msg);
        closeModal();
        setTimeout(() => { isPaused = false; }, 800);
        return;
    }

    const modalBtn = document.getElementById('m-btn');
    const finishBtn = document.getElementById('f-btn');
    
    if (modalBtn.disabled) return;
    
    // 2. Батырмаларды блоктау
    modalBtn.disabled = true;
    modalBtn.innerText = ui[L].fin_done || "АЯҚТАЛДЫ";
    if(finishBtn) {
        finishBtn.disabled = true;
        finishBtn.innerText = ui[L].fin_done || "АЯҚТАЛДЫ";
    }

    isFinished = true; 
    isStarted = false; 
    clearInterval(timer); 

    // 3. Нәтижені есептеу
    let r = 0; ans.forEach((a, i) => { if (a === qs[i].c) r++; }); 
    let p = (viol >= 3) ? (viol - 2) : 0;
    const res = { 
        L, 
        ln: document.getElementById('ln').value, 
        fn: document.getElementById('fn').value, 
        raw: r, 
        viol, 
        pen: p, 
        score: Math.max(0, r-p) 
    };
    
    localStorage.removeItem('quiz_progress');
    localStorage.setItem('quiz_result', JSON.stringify(res));

    closeModal();
    showResult(res);

    fetch('https://script.google.com/macros/s/AKfycbx1XKGUnCtvWlsQgjaRYPwu5DJ0tG6wJv6LsWgVMNIufeVCUfg9t_VK-ofgcqinvhvA/exec', {
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify(res)
    }).catch(err => console.log("Дерек жіберу қатесі:", err));
}

function showResult(d) {
    L = d.L; updateUI();
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    document.getElementById('r-n').innerText = d.ln + " " + d.fn;
    document.getElementById('r-score-big').innerText = d.score;
    document.getElementById('r-p').innerText = Math.round((d.score/20)*100) + "%";
    document.getElementById('r-raw').innerText = d.raw;
    document.getElementById('r-viol').innerText = d.viol;
    document.getElementById('r-pen').innerText = d.pen;
}

window.onblur = function() {
    // Тексеріс: Тест басталған болуы керек және аяқталмауы керек
    if(!isStarted || isFinished || isPaused) return;
    
    // Егер "Аяқтау" модаль терезесі ашық болса, есептемеу
    if(!document.getElementById('modal').classList.contains('hidden')) return;

    viol++; 
    document.getElementById('v-c').innerText = viol;
    
    let msg = "";
    // Айыппұл: 3-ші рет шыққанда 1 балл, 4-шіде 2 балл және т.б.
    const penalty = (viol >= 3) ? (viol - 2) : 0;

    if (L === 'kz') {
        if (viol === 1) msg = "⚠️ ЕСКЕРТУ (1/2): Басқа терезеге ауыспаңыз!";
        else if (viol === 2) msg = "🚫 ҚАТАҢ ЕСКЕРТУ (2/2): Келесі жолы балл алынады!";
        else msg = `❌ ЕРЕЖЕ БҰЗЫЛДЫ! ${penalty} балл шегерілді!`;
    } else {
        if (viol === 1) msg = "⚠️ ПРЕДУПРЕЖДЕНИЕ (1/2): Не выходите из окна!";
        else if (viol === 2) msg = "🚫 ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ (2/2): В следующий раз будет снят балл!";
        else msg = `❌ НАРУШЕНИЕ! Снято баллов: ${penalty}`;
    }

    if (penalty > 0) {
        document.getElementById('pen-info').style.display = "inline";
        document.getElementById('pen-count').innerText = penalty;
    }

    isPaused = true; 
    alert(msg);
    // Паузаны сәл кешіктіріп ашамыз, браузер "фокусты" қайта алғанша
    setTimeout(() => { isPaused = false; }, 800);
};
window.onload = () => { 
    setLanguage(L); // 1. Тілді және интерфейсті баптайды
    loadProgress(); // 2. Сақталған прогресті тексереді
};

// БАРЛЫҚ ТЕХНИКАЛЫҚ КОМАНДАЛАРДЫ БЛОКТАУ
document.onkeydown = function(e) {
    // F12 (123)
    if (e.keyCode === 123) {
        return false;
    }
    // Ctrl+Shift+I (73), Ctrl+Shift+J (74), Ctrl+Shift+C (67)
    if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
        return false;
    }
    // Ctrl+U (85) - Кодты қарау, Ctrl+S (83) - Сақтау
    if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) {
        return false;
    }
    // Ctrl+C (67), Ctrl+V (86), Ctrl+X (88) - Көшіру/Қою
    if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 88)) {
        return false;
    }
};    
    
</script>
